<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Routine · FitMol</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <a href="home.html" class="navbar-brand">⚡ FitMol</a>
    <div class="navbar-nav"></div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="nav-avatar-wrap" id="nav-avatar-wrap">
        <div class="navbar-avatar" id="nav-avatar" onclick="toggleAvatarMenu(event)">?</div>
        <div class="avatar-menu" id="avatar-menu">
          <div class="avatar-menu-username" id="nav-username">...</div>
          <a href="profile.html" class="avatar-menu-item">⚙️ Settings</a>
          <button class="avatar-menu-item" onclick="openContactModal()">✉️ Message</button>
          <button class="avatar-menu-item avatar-menu-logout" onclick="logout()">🚪 Logout</button>
        </div>
      </div>
    </div>
  </nav>
  <main class="home-content" id="routine-page">
    <div style="padding:20px 20px 0">
      <div class="page-title">📋 Routine</div>
    </div>
    <div class="routine-grid">
      <a href="exercises.html" class="routine-card" style="background:linear-gradient(135deg,#021941,#052865)">
        <div class="routine-card-icon">💪</div>
        <div class="routine-card-content">
          <div class="routine-card-title">Exercises</div>
          <div class="routine-card-desc">Create an exercise</div>
        </div>
        <div class="routine-card-arrow">→</div>
      </a>
      <a href="training.html" class="routine-card" style="background:linear-gradient(135deg,#021941,#052865)">
        <div class="routine-card-icon">🏋️</div>
        <div class="routine-card-content">
          <div class="routine-card-title">Training</div>
          <div class="routine-card-desc">Build a personalized Training session</div>
        </div>
        <div class="routine-card-arrow">→</div>
      </a>
      <a href="plan.html" class="routine-card" style="background:linear-gradient(135deg,#021941,#052865)">
        <div class="routine-card-icon">📅</div>
        <div class="routine-card-content">
          <div class="routine-card-title">Workout Plan</div>
          <div class="routine-card-desc">Plan your week</div>
        </div>
        <div class="routine-card-arrow">→</div>
      </a>
    </div>
  </main>
  <nav class="bottom-nav">
    <a href="home.html" class="bottom-nav-item"><span class="bn-icon">🏠</span><span>Home</span></a>
    <a href="routine.html" class="bottom-nav-item active"><span class="bn-icon">📋</span><span>Routine</span></a>
    <button class="bottom-nav-item bn-train-btn" onclick="openTrainModal()"><span class="bn-icon">⚡</span><span>Train</span></button>
    <a href="analytics.html" class="bottom-nav-item"><span class="bn-icon">📊</span><span>Diary</span></a>
    <a href="profile.html" class="bottom-nav-item"><span class="bn-icon">👤</span><span>Profile</span></a>
  </nav>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
