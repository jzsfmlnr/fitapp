<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercises · FitMol</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="home.html" class="navbar-brand">⚡ FitMol</a>
      <div class="navbar-nav">
        <a href="exercises.html" class="nav-link active" data-i18n="nav_exercises">Exercises</a>
        <a href="training.html" class="nav-link" data-i18n="nav_training">Training</a>
        <a href="plan.html" class="nav-link" data-i18n="nav_plan">Plan</a>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="nav-tool-wrap" id="nav-tool-wrap">
          <button class="nav-tool-btn" onclick="toggleToolMenu(event)">⚡ Tools</button>
          <div class="tool-menu" id="tool-menu">
            <div class="tool-menu-header">Tools</div>
            <button class="avatar-menu-item" onclick="openBmiModal()">📊 BMI Calculator</button>
            <button class="avatar-menu-item" onclick="openCalorieModal()">🤖 Calorie AI</button>
          </div>
        </div>
        <div class="nav-avatar-wrap" id="nav-avatar-wrap">
          <div class="navbar-avatar" id="nav-avatar" onclick="toggleAvatarMenu(event)">?</div>
          <div class="avatar-menu" id="avatar-menu">
            <div class="avatar-menu-username" id="nav-username">...</div>
            <a href="profile.html" class="avatar-menu-item" data-i18n="menu_settings">⚙️ Settings</a>
            <button class="avatar-menu-item" onclick="openContactModal()" data-i18n="menu_message">✉️ Message</button>
            <button class="avatar-menu-item avatar-menu-logout" onclick="logout()" data-i18n="menu_logout">🚪 Logout</button>
          </div>
        </div>
      </div>
    </nav>
    <main class="home-content">
      <div class="page-header">
        <div class="page-title" data-i18n="page_exercises_title">💪 Exercises</div>
        <button class="btn btn-primary" style="width:auto;padding:12px 24px" onclick="openExerciseModal()" data-i18n="btn_new_exercise">+ New Exercise</button>
      </div>
      <div id="exercise-grid" class="exercise-grid">
        <div class="empty-state"><div class="empty-state-icon">💪</div><div class="empty-state-text" data-i18n="empty_exercises">No exercises created yet.</div></div>
      </div>
    </main>
    <!-- EXERCISE MODAL -->
    <div class="modal-overlay" id="exercise-modal">
      <div class="modal-card">
        <div class="modal-header">
          <div class="modal-title" id="modal-title-text" data-i18n="modal_new_exercise">New Exercise</div>
          <button class="modal-close" onclick="closeExerciseModal()">×</button>
        </div>
        <div id="modal-alert" class="alert alert-error"></div>
        <input type="hidden" id="edit-exercise-id" />
        <div class="form-group">
          <label class="form-label" for="ex-name" data-i18n="label_name">Name</label>
          <input class="form-input" type="text" id="ex-name" data-i18n-ph="ex_name_ph" placeholder="e.g. Squat" />
        </div>
        <div class="form-group">
          <label class="form-label" for="ex-abbr" data-i18n="label_abbr">Abbreviation</label>
          <input class="form-input" type="text" id="ex-abbr" data-i18n-ph="ex_abbr_ph" placeholder="e.g. SQ" maxlength="12" />
        </div>
        <div class="form-group">
          <label class="form-label" for="ex-desc" data-i18n="label_desc">Description</label>
          <textarea class="form-textarea" id="ex-desc" data-i18n-ph="ex_desc_ph" placeholder="Short description of the exercise…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="label_tag">Muscle Group</label>
          <div class="tag-selector" id="ex-tag-selector"></div>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="label_image">Image</label>
          <div class="tab-bar" style="margin-bottom:12px">
            <button class="tab-btn active" id="img-tab-upload" onclick="switchImgTab('upload')" data-i18n="btn_upload_tab">📁 Upload</button>
            <button class="tab-btn" id="img-tab-camera" onclick="switchImgTab('camera')" data-i18n="btn_camera_tab">📷 Camera</button>
            <button class="tab-btn" id="img-tab-ai" onclick="switchImgTab('ai')">✨ AI</button>
          </div>
          <div id="img-panel-upload">
            <div class="img-picker-preview" onclick="document.getElementById('ex-img-file').click()">
              <img id="upload-preview-img" src="" style="display:none" />
              <div class="img-picker-placeholder" id="upload-placeholder"><div>🖼️</div><div data-i18n="click_to_upload">Click to Upload</div></div>
            </div>
            <input type="file" id="ex-img-file" accept="image/*" style="display:none" onchange="handleExerciseImageUpload(event)" />
          </div>
          <div id="img-panel-camera" style="display:none">
            <video class="camera-video" id="camera-video" autoplay playsinline></video>
            <div class="camera-controls">
              <button class="btn btn-primary" style="width:auto;padding:10px 20px" onclick="capturePhoto()" data-i18n="btn_capture">📸 Capture</button>
              <button class="btn btn-outline" style="width:auto;padding:10px 20px" onclick="stopCamera()" data-i18n="btn_cancel">Cancel</button>
            </div>
            <img id="camera-preview-img" src="" style="display:none;width:100%;border-radius:12px;margin-top:10px" />
          </div>
          <div id="img-panel-ai" style="display:none">
            <div style="text-align:center;padding:8px 0 12px">
              <button class="btn btn-primary" id="ai-generate-btn" onclick="generateExerciseImageAI()" style="width:auto;padding:10px 24px">✨ Generate Image</button>
              <div id="ai-status" style="color:var(--gray);font-size:13px;margin-top:8px;min-height:18px"></div>
            </div>
            <div class="img-picker-preview" style="cursor:default;position:relative">
              <img id="ai-preview-img" src="" style="display:none;width:100%;border-radius:12px" />
              <div class="img-picker-placeholder" id="ai-placeholder"><div style="font-size:32px">✨</div><div>Enter a name, then generate</div></div>
            </div>
          </div>
        </div>
        <button class="btn btn-primary" id="modal-save-btn" onclick="saveExercise()" data-i18n="btn_save_exercise">Save Exercise</button>
      </div>
    </div>
    <nav class="bottom-nav">
      <a href="home.html" class="bottom-nav-item"><span class="bn-icon">🏠</span><span data-i18n="bn_home">Home</span></a>
      <a href="routine.html" class="bottom-nav-item active"><span class="bn-icon">📋</span><span data-i18n="bn_routine">Routine</span></a>
      <a href="train.html" class="bottom-nav-item bn-train-btn"><span class="bn-icon">⚡</span><span data-i18n="bn_train">Train</span></a>
      <a href="analytics.html" class="bottom-nav-item"><span class="bn-icon">📊</span><span data-i18n="bn_diary">Diary</span></a>
      <a href="social.html" class="bottom-nav-item"><span class="bn-icon">👥</span><span data-i18n="bn_social">Social</span></a>
    </nav>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
