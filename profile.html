<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil · FitMol</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <a href="home.html" class="navbar-brand">⚡ FitMol</a>
    <div class="navbar-nav">
      <a href="exercises.html" class="nav-link" data-i18n="nav_exercises">Übungen</a>
      <a href="training.html" class="nav-link" data-i18n="nav_training">Training</a>
      <a href="plan.html" class="nav-link" data-i18n="nav_plan">Plan</a>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="nav-tool-wrap" id="nav-tool-wrap">
        <button class="nav-tool-btn" onclick="toggleToolMenu(event)">⚡ Tool</button>
        <div class="tool-menu" id="tool-menu">
          <div class="tool-menu-header">Tools</div>
          <button class="avatar-menu-item" onclick="openBmiModal()">📊 BMI Rechner</button>
          <button class="avatar-menu-item" onclick="openCalorieModal()">🤖 Calorie AI</button>
        </div>
      </div>
      <div class="nav-avatar-wrap" id="nav-avatar-wrap">
        <div class="navbar-avatar" id="nav-avatar" onclick="toggleAvatarMenu(event)">?</div>
        <div class="avatar-menu" id="avatar-menu">
          <div class="avatar-menu-username" id="nav-username">...</div>
          <a href="profile.html" class="avatar-menu-item" data-i18n="menu_settings">⚙️ Einstellungen</a>
          <button class="avatar-menu-item" onclick="openContactModal()" data-i18n="menu_message">✉️ Nachricht</button>
          <button class="avatar-menu-item avatar-menu-logout" onclick="logout()" data-i18n="menu_logout">🚪 Abmelden</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="home-content">

    <div class="greeting-card" style="margin-bottom:36px">
      <div class="greeting-label" data-i18n="settings_label">Einstellungen</div>
      <h1 class="greeting-headline" data-i18n="profile_headline">Dein Profil ✏️</h1>
      <p class="greeting-sub" data-i18n="profile_sub">Passe deine persönlichen Informationen an.</p>
    </div>

    <div class="bmi-card">

      <div class="profile-avatar-section">
        <div class="profile-avatar-wrap" onclick="document.getElementById('avatar-input').click()">
          <img id="profile-avatar-img" src="" alt="Avatar" style="display:none" />
          <div id="profile-avatar-placeholder" class="profile-avatar-placeholder">
            <span id="profile-avatar-initial">?</span>
          </div>
          <div class="profile-avatar-overlay">📷</div>
        </div>
        <div class="profile-avatar-info">
          <div class="profile-avatar-name" id="profile-display-name">...</div>
          <div class="profile-avatar-hint">Klicke auf das Bild zum Ändern</div>
        </div>
        <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)" />
      </div>

      <div class="profile-divider"></div>

      <div id="profile-alert" class="alert alert-error"></div>
      <div id="profile-success" class="alert alert-success"></div>

      <div class="bmi-grid">
        <div class="form-group">
          <label class="form-label" for="prof-birthdate" data-i18n="label_birthdate">Geburtsdatum</label>
          <input class="form-input" type="date" id="prof-birthdate" />
        </div>
        <div class="form-group">
          <label class="form-label" for="prof-gender" data-i18n="label_gender">Geschlecht</label>
          <select class="form-input form-select" id="prof-gender">
            <option value="">— Bitte wählen —</option>
            <option value="male">Männlich</option>
            <option value="female">Weiblich</option>
            <option value="diverse">Divers</option>
            <option value="none">Keine Angabe</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="prof-language" data-i18n="label_language">Sprache</label>
          <select class="form-input form-select" id="prof-language" onchange="setLang(this.value); applyLanguage(this.value)">
            <option value="de">Deutsch</option>
            <option value="en">English</option>
            <option value="hu">Magyar</option>
          </select>
        </div>
      </div>

      <button class="btn btn-primary" id="save-btn" onclick="saveProfile()" data-i18n="btn_save">Speichern ✓</button>

      <div style="margin-top:20px;text-align:center">
        <button class="btn btn-outline" style="width:auto;padding:10px 24px;color:#c0392b;border-color:#c0392b" onclick="logout()" data-i18n="btn_logout_btn">🚪 Abmelden</button>
      </div>

    </div>
  </main>

  <nav class="bottom-nav">
    <a href="home.html" class="bottom-nav-item"><span class="bn-icon">🏠</span><span data-i18n="bn_home">Home</span></a>
    <a href="exercises.html" class="bottom-nav-item"><span class="bn-icon">💪</span><span data-i18n="bn_exercises">Übungen</span></a>
    <a href="training.html" class="bottom-nav-item"><span class="bn-icon">🏋️</span><span data-i18n="bn_training">Training</span></a>
    <a href="plan.html" class="bottom-nav-item"><span class="bn-icon">📅</span><span data-i18n="bn_plan">Plan</span></a>
    <a href="profile.html" class="bottom-nav-item active"><span class="bn-icon">👤</span><span data-i18n="bn_profile">Profil</span></a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
