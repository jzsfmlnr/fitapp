<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile · FitMol</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="home.html" class="navbar-brand">⚡ FitMol</a>
      <div class="navbar-nav">
        <a href="exercises.html" class="nav-link" data-i18n="nav_exercises">Exercises</a>
        <a href="training.html" class="nav-link" data-i18n="nav_training">Training</a>
        <a href="plan.html" class="nav-link" data-i18n="nav_plan">Plan</a>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="nav-tool-wrap" id="nav-tool-wrap">
          <button class="nav-tool-btn" onclick="toggleToolMenu(event)">⚡ Tool</button>
          <div class="tool-menu" id="tool-menu">
            <div class="tool-menu-header">Tools</div>
            <button class="avatar-menu-item" onclick="openBmiModal()">📊 BMI Calculator</button>
            <button class="avatar-menu-item" onclick="openCalorieModal()">🤖 Calorie AI</button>
          </div>
        </div>
        <div class="nav-avatar-wrap" id="nav-avatar-wrap">
          <div class="navbar-avatar" id="nav-avatar" onclick="toggleAvatarMenu(event)">?</div>
          <div class="avatar-menu" id="avatar-menu">
            <div class="avatar-menu-username" id="nav-username">...</div>
            <a href="profile.html" class="avatar-menu-item" data-i18n="menu_settings">⚙️ Settings</a>
            <button class="avatar-menu-item" onclick="openContactModal()" data-i18n="menu_message">✉️ Message</button>
            <button class="avatar-menu-item avatar-menu-logout" onclick="logout()" data-i18n="menu_logout">🚪 Logout</button>
          </div>
        </div>
      </div>
    </nav>
    <main class="home-content profile-page-main">
      <div class="bmi-card">
        <div class="profile-avatar-section">
          <div class="profile-avatar-wrap" onclick="document.getElementById('avatar-input').click()">
            <img id="profile-avatar-img" src="" alt="Avatar" style="display:none" />
            <div id="profile-avatar-placeholder" class="profile-avatar-placeholder">
              <span id="profile-avatar-initial">?</span>
            </div>
            <div class="profile-avatar-overlay">📷</div>
          </div>
          <div class="profile-avatar-info">
            <div class="profile-avatar-name" id="profile-display-name">...</div>
            <div class="profile-avatar-hint">Click on the image to change</div>
          </div>
          <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)" />
        </div>
        <div class="profile-divider"></div>
        <div id="profile-alert" class="alert alert-error"></div>
        <div id="profile-success" class="alert alert-success"></div>
        <div class="bmi-grid">
          <div class="form-group">
            <label class="form-label" for="prof-birthdate" data-i18n="label_birthdate">Date of Birth</label>
            <input class="form-input" type="date" id="prof-birthdate" />
          </div>
          <div class="form-group">
            <label class="form-label" for="prof-gender" data-i18n="label_gender">Gender</label>
            <select class="form-input form-select" id="prof-gender">
              <option value="">— Please select —</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="diverse">Diverse</option>
              <option value="none">Prefer not to say</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="prof-language" data-i18n="label_language">Language</label>
            <select class="form-input form-select" id="prof-language" onchange="setLang(this.value); applyLanguage(this.value)">
              <option value="en" selected>English</option>
              <option value="de">Deutsch</option>
              <option value="hu">Magyar</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary" id="save-btn" onclick="saveProfile()" data-i18n="btn_save" style="margin-top:8px">Save ✓</button>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-outline" style="flex:1;padding:8px 12px;font-size:12px" onclick="openChangePasswordModal()" data-i18n="pw_change_btn">🔒 Change Password</button>
          <button class="btn btn-outline" style="flex:1;padding:8px 12px;color:var(--red);border-color:var(--red);font-size:12px" onclick="logout()" data-i18n="btn_logout_btn">🚪 Logout</button>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;width:100%;max-width:420px">
        <button class="btn btn-outline" style="flex:1;padding:7px 8px;font-size:11px;color:var(--gray);border-color:var(--border)" onclick="openImprintModal()" data-i18n="imprint_btn">Imprint</button>
        <button class="btn btn-outline" style="flex:1;padding:7px 8px;font-size:11px;color:var(--gray);border-color:var(--border)" onclick="openPrivacyModal()" data-i18n="privacy_btn">Terms and Conditions</button>
      </div>
    </main>
    <nav class="bottom-nav">
      <a href="home.html" class="bottom-nav-item"><span class="bn-icon">🏠</span><span data-i18n="bn_home">Home</span></a>
      <a href="routine.html" class="bottom-nav-item"><span class="bn-icon">📋</span><span data-i18n="bn_routine">Routine</span></a>
      <a href="train.html" class="bottom-nav-item bn-train-btn"><span class="bn-icon">⚡</span><span data-i18n="bn_train">Train</span></a>
      <a href="analytics.html" class="bottom-nav-item"><span class="bn-icon">📊</span><span data-i18n="bn_diary">Diary</span></a>
      <a href="social.html" class="bottom-nav-item"><span class="bn-icon">👥</span><span data-i18n="bn_social">Social</span></a>
    </nav>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
