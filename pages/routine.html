<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#1a6fff">
  <title>Routine · FitMol</title>
  <link rel="stylesheet" href="../css/core.css" />
  <link rel="stylesheet" href="../css/analytics.css" />
</head>
<body>
  <nav class="navbar">
    <a href="home.html" class="navbar-brand">⚡ FitMol</a>
    <div class="navbar-nav"></div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="nav-tool-wrap" id="nav-tool-wrap">
        <button class="nav-tool-btn" onclick="toggleToolMenu(event)">⚡ Tools</button>
        <div class="tool-menu" id="tool-menu">
          <div class="tool-menu-header">Tools</div>
          <button class="avatar-menu-item" onclick="openBmiModal()">📊 BMI Calculator</button>
          <button class="avatar-menu-item" onclick="openCalorieModal()">🤖 Calorie AI</button>
        </div>
      </div>
      <div class="nav-avatar-wrap" id="nav-avatar-wrap">
        <div class="navbar-avatar" id="nav-avatar" onclick="toggleAvatarMenu(event)">?</div>
        <div class="avatar-menu" id="avatar-menu">
          <div class="avatar-menu-username" id="nav-username">...</div>
          <a href="profile.html" class="avatar-menu-item" data-i18n="menu_settings">⚙️ Settings</a>
          <button class="avatar-menu-item" onclick="openContactModal()" data-i18n="menu_message">✉️ Message</button>
          <button class="avatar-menu-item avatar-menu-logout" onclick="logout()" data-i18n="menu_logout">🚪 Logout</button>
        </div>
      </div>
    </div>
  </nav>
  <main class="home-content routine-main" id="routine-page">
    <div class="routine-grid">
      <a href="exercises.html" class="routine-card" style="background:linear-gradient(135deg,#021941,#052865)">
        <div class="routine-card-content">
          <div class="routine-card-title" data-i18n="card_exercises_title">Exercises</div>
          <div class="routine-card-desc" data-i18n="routine_ex_desc">Create an exercise</div>
        </div>
        <div class="routine-card-arrow">→</div>
      </a>
      <a href="training.html" class="routine-card" style="background:linear-gradient(135deg,#021941,#052865)">
        <div class="routine-card-content">
          <div class="routine-card-title" data-i18n="card_training_title">Training</div>
          <div class="routine-card-desc" data-i18n="routine_tr_desc">Build a personalized training session</div>
        </div>
        <div class="routine-card-arrow">→</div>
      </a>
      <a href="plan.html" class="routine-card" style="background:linear-gradient(135deg,#021941,#052865)">
        <div class="routine-card-content">
          <div class="routine-card-title" data-i18n="routine_plan_title">Workout Plan</div>
          <div class="routine-card-desc" data-i18n="routine_plan_desc">Plan your week</div>
        </div>
        <div class="routine-card-arrow">→</div>
      </a>
    </div>
  </main>
  <nav class="bottom-nav">
    <a href="home.html" class="bottom-nav-item"><span class="bn-icon">🏠</span><span data-i18n="bn_home">Home</span></a>
    <a href="routine.html" class="bottom-nav-item active"><span class="bn-icon">📋</span><span data-i18n="bn_routine">Routine</span></a>
    <a href="train.html" class="bottom-nav-item bn-train-btn"><span class="bn-icon">⚡</span><span data-i18n="bn_train">Train</span></a>
    <a href="analytics.html" class="bottom-nav-item"><span class="bn-icon">📊</span><span data-i18n="bn_diary">Diary</span></a>
    <a href="social.html" class="bottom-nav-item"><span class="bn-icon">👥</span><span data-i18n="bn_social">Social</span></a>
  </nav>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="../js/app-core.js"></script>
  <script src="../js/app-train.js"></script>
  <script src="../js/app-init.js"></script>
</body>
</html>
