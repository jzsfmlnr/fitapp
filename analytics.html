<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics · FitMol</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <a href="home.html" class="navbar-brand">⚡ FitMol</a>
    <div class="navbar-nav"></div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="nav-avatar-wrap" id="nav-avatar-wrap">
        <div class="navbar-avatar" id="nav-avatar" onclick="toggleAvatarMenu(event)">?</div>
        <div class="avatar-menu" id="avatar-menu">
          <div class="avatar-menu-username" id="nav-username">...</div>
          <a href="profile.html" class="avatar-menu-item">⚙️ Einstellungen</a>
          <button class="avatar-menu-item" onclick="openContactModal()">✉️ Nachricht</button>
          <button class="avatar-menu-item avatar-menu-logout" onclick="logout()">🚪 Abmelden</button>
        </div>
      </div>
    </div>
  </nav>
  <main class="home-content">
    <div class="page-header">

    </div>
    <!-- Calendar card -->
    <div class="builder-card" style="margin:0 0 16px">
      <div class="builder-card-title" style="display:flex;justify-content:space-between;align-items:center">
        <button onclick="changeAnalyticsMonth(-1)" style="background:none;border:none;color:var(--black);font-size:20px;cursor:pointer">‹</button>
        <span id="analytics-month-title"></span>
        <button onclick="changeAnalyticsMonth(1)" style="background:none;border:none;color:var(--black);font-size:20px;cursor:pointer">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px;text-align:center">
        <div style="font-size:11px;color:var(--gray);padding:4px">Mo</div>
        <div style="font-size:11px;color:var(--gray);padding:4px">Di</div>
        <div style="font-size:11px;color:var(--gray);padding:4px">Mi</div>
        <div style="font-size:11px;color:var(--gray);padding:4px">Do</div>
        <div style="font-size:11px;color:var(--gray);padding:4px">Fr</div>
        <div style="font-size:11px;color:var(--gray);padding:4px">Sa</div>
        <div style="font-size:11px;color:var(--gray);padding:4px">So</div>
      </div>
      <div class="analytics-calendar" id="analytics-calendar"></div>
    </div>
    <!-- Weekly chart card -->
    <div class="builder-card" style="margin:0 0 16px">
      <div class="builder-card-title">Wöchentliche Trainings</div>
      <div class="analytics-chart-wrap">
        <svg id="analytics-chart-svg" viewBox="0 0 300 150" style="width:100%;overflow:visible"></svg>
      </div>
    </div>
  </main>
  <nav class="bottom-nav">
    <a href="home.html" class="bottom-nav-item"><span class="bn-icon">🏠</span><span>Home</span></a>
    <a href="routine.html" class="bottom-nav-item"><span class="bn-icon">📋</span><span>Routine</span></a>
    <button class="bottom-nav-item bn-train-btn" onclick="openTrainModal()"><span class="bn-icon">⚡</span><span>Train</span></button>
    <a href="analytics.html" class="bottom-nav-item active"><span class="bn-icon">📊</span><span>Analytics</span></a>
    <a href="profile.html" class="bottom-nav-item"><span class="bn-icon">👤</span><span>Profil</span></a>
  </nav>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
