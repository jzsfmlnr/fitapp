<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · FitMol</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-icon">⚡</div>
        <span class="auth-logo-text">FitMol</span>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Anmelden</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Registrieren</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="panel-login">
        <h1 class="auth-title">Willkommen zurück</h1>
        <p class="auth-subtitle">Meld dich an, um fortzufahren.</p>

        <div id="login-alert" class="alert alert-error"></div>

        <div class="form-group">
          <label class="form-label" for="login-username">Benutzername</label>
          <input class="form-input" type="text" id="login-username" placeholder="Dein Benutzername" autocomplete="username" />
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Passwort</label>
          <input class="form-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <button class="btn btn-primary" onclick="doLogin()">Anmelden →</button>
      </div>

      <!-- REGISTER FORM -->
      <div id="panel-register" style="display:none">
        <h1 class="auth-title">Konto erstellen</h1>
        <p class="auth-subtitle">Einmal registrieren, jederzeit einloggen.</p>

        <div id="register-alert" class="alert alert-error"></div>
        <div id="register-success" class="alert alert-success"></div>

        <div class="form-group">
          <label class="form-label" for="reg-username">Benutzername</label>
          <input class="form-input" type="text" id="reg-username" placeholder="Deinen Benutzernamen wählen" autocomplete="username" />
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-password">Passwort</label>
          <input class="form-input" type="password" id="reg-password" placeholder="Mindestens 6 Zeichen" autocomplete="new-password" />
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-password2">Passwort wiederholen</label>
          <input class="form-input" type="password" id="reg-password2" placeholder="Passwort bestätigen" autocomplete="new-password" />
        </div>

        <button class="btn btn-gold" onclick="doRegister()">Konto erstellen ✓</button>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
