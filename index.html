<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1a6fff">
  <title>Login · FitMol</title>
  <link rel="stylesheet" href="css/core.css" />
</head>
<body>
  <div class="auth-bg">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-icon">⚡</div>
        <span class="auth-logo-text">FitMol</span>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="panel-login">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Sign in to continue.</p>

        <div id="login-alert" class="alert alert-error"></div>

        <div class="form-group">
          <label class="form-label" for="login-username">Username</label>
          <input class="form-input" type="text" id="login-username" placeholder="Your username" autocomplete="username" />
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <button class="btn btn-primary" onclick="doLogin()">Login →</button>
      </div>

      <!-- REGISTER FORM -->
      <div id="panel-register" style="display:none">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Register once, log in anytime.</p>

        <div id="register-alert" class="alert alert-error"></div>
        <div id="register-success" class="alert alert-success"></div>

        <div class="form-group">
          <label class="form-label" for="reg-username">Username</label>
          <input class="form-input" type="text" id="reg-username" placeholder="Choose a username" autocomplete="username" />
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input class="form-input" type="password" id="reg-password" placeholder="At least 6 characters" autocomplete="new-password" />
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-password2">Repeat Password</label>
          <input class="form-input" type="password" id="reg-password2" placeholder="Confirm password" autocomplete="new-password" />
        </div>

        <button class="btn btn-gold" onclick="doRegister()">Create Account ✓</button>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/app-core.js"></script>
  <script src="js/app-init.js"></script>
</body>
</html>
