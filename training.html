<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training · FitMol</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <a href="home.html" class="navbar-brand">⚡ FitMol</a>
    <div class="navbar-nav">
      <a href="exercises.html" class="nav-link" data-i18n="nav_exercises">Exercises</a>
      <a href="training.html" class="nav-link active" data-i18n="nav_training">Training</a>
      <a href="plan.html" class="nav-link" data-i18n="nav_plan">Plan</a>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="nav-tool-wrap" id="nav-tool-wrap">
        <button class="nav-tool-btn" onclick="toggleToolMenu(event)">⚡ Tools</button>
        <div class="tool-menu" id="tool-menu">
          <div class="tool-menu-header">Tools</div>
          <button class="avatar-menu-item" onclick="openBmiModal()">📊 BMI Calculator</button>
          <button class="avatar-menu-item" onclick="openCalorieModal()">🤖 Calorie AI</button>
        </div>
      </div>
      <div class="nav-avatar-wrap" id="nav-avatar-wrap">
        <div class="navbar-avatar" id="nav-avatar" onclick="toggleAvatarMenu(event)">?</div>
        <div class="avatar-menu" id="avatar-menu">
          <div class="avatar-menu-username" id="nav-username">...</div>
          <a href="profile.html" class="avatar-menu-item" data-i18n="menu_settings">⚙️ Settings</a>
          <button class="avatar-menu-item" onclick="openContactModal()" data-i18n="menu_message">✉️ Message</button>
          <button class="avatar-menu-item avatar-menu-logout" onclick="logout()" data-i18n="menu_logout">🚪 Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="home-content">
    <div class="page-header">
      <div class="page-title" data-i18n="page_training_title">📋 My Trainings</div>
      <button class="btn btn-primary" style="width:auto;padding:12px 24px" onclick="openTrainingModal()" data-i18n="btn_new_training">+ New Training</button>
    </div>
    <div id="saved-trainings-list">
      <div class="empty-state"><div class="empty-state-icon">🏋️</div><div class="empty-state-text" data-i18n="empty_workouts">No workouts saved yet.</div></div>
    </div>
  </main>

  <!-- TRAINING BUILDER MODAL -->
  <div class="modal-overlay" id="training-builder-modal">
    <div class="training-builder-card">
      <div class="tb-header">
        <div class="modal-title" id="training-modal-title" data-i18n="modal_new_training_title">Create Training</div>
        <button class="modal-close" onclick="closeTrainingModal()">×</button>
      </div>
      <div class="tb-body">
        <input type="hidden" id="edit-training-id" />
        <div id="training-alert" class="alert alert-error"></div>
        <div class="builder-card builder-card-compact">
          <div class="training-info-row">
            <div class="training-info-fields">
              <input class="form-input training-info-input" type="text" id="tr-title" data-i18n-ph="tr_title_ph" placeholder="Title" />
              <input class="form-input training-info-input" type="text" id="tr-desc" data-i18n-ph="tr_desc_ph" placeholder="Description (optional)" />
            </div>
            <div class="training-info-intensity">
              <div class="intensity-label-row">
                <span class="form-label" style="margin:0" data-i18n="label_intensity">Intensity</span>
                <span id="intensity-val-label" class="intensity-val-label">3</span>
              </div>
              <input type="range" min="1" max="5" value="3" id="tr-intensity" class="intensity-slider" oninput="updateIntensityDisplay(this.value)" />
              <div class="intensity-dots" id="intensity-dots"></div>
            </div>
          </div>
        </div>
        <div class="builder-card builder-ex-section">
          <div class="builder-card-title" data-i18n="section_add_exercises">Add Exercises</div>
          <div class="builder-ex-strip" id="builder-ex-strip"></div>
          <div class="training-ex-grid" id="training-ex-grid"
               ondragover="event.preventDefault()"
               ondrop="onDropToTrainingGrid(event)">
            <div class="training-grid-empty" id="training-grid-empty">
              <div>⬇️</div>
              <div data-i18n="dropzone_hint">Drag or tap exercises</div>
            </div>
          </div>
        </div>
      </div>
      <div class="tb-footer">
        <button class="btn btn-primary" id="training-save-btn" onclick="saveTraining()" data-i18n="btn_save_training">Save Training ✓</button>
      </div>
    </div>
  </div>

  <!-- VIEW TRAINING MODAL -->
  <div class="modal-overlay" id="view-training-modal">
    <div class="modal-card" style="max-width:580px">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="vt-title"></div>
          <div style="color:var(--gray);font-size:13px;margin-top:4px" id="vt-meta"></div>
        </div>
        <button class="modal-close" onclick="document.getElementById('view-training-modal').classList.remove('open')">×</button>
      </div>
      <div id="vt-desc" style="font-size:14px;color:var(--gray);margin-bottom:20px;display:none"></div>
      <div id="vt-exercises"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="home.html" class="bottom-nav-item"><span class="bn-icon">🏠</span><span data-i18n="bn_home">Home</span></a>
    <a href="routine.html" class="bottom-nav-item active"><span class="bn-icon">📋</span><span data-i18n="bn_routine">Routine</span></a>
    <a href="train.html" class="bottom-nav-item bn-train-btn"><span class="bn-icon">⚡</span><span data-i18n="bn_train">Train</span></a>
    <a href="analytics.html" class="bottom-nav-item"><span class="bn-icon">📊</span><span data-i18n="bn_diary">Diary</span></a>
    <a href="social.html" class="bottom-nav-item"><span class="bn-icon">👥</span><span data-i18n="bn_social">Social</span></a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
