<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training · FitMol</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <a href="home.html" class="navbar-brand">⚡ FitMol</a>
    <div class="navbar-nav">
      <a href="exercises.html" class="nav-link" data-i18n="nav_exercises">Übungen</a>
      <a href="training.html" class="nav-link active" data-i18n="nav_training">Training</a>
      <a href="plan.html" class="nav-link" data-i18n="nav_plan">Plan</a>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="nav-tool-wrap" id="nav-tool-wrap">
        <button class="nav-tool-btn" onclick="toggleToolMenu(event)">⚡ Tool</button>
        <div class="tool-menu" id="tool-menu">
          <div class="tool-menu-header">Tools</div>
          <button class="avatar-menu-item" onclick="openBmiModal()">📊 BMI Rechner</button>
          <button class="avatar-menu-item" onclick="openCalorieModal()">🤖 Calorie AI</button>
        </div>
      </div>
      <div class="nav-avatar-wrap" id="nav-avatar-wrap">
        <div class="navbar-avatar" id="nav-avatar" onclick="toggleAvatarMenu(event)">?</div>
        <div class="avatar-menu" id="avatar-menu">
          <div class="avatar-menu-username" id="nav-username">...</div>
          <a href="profile.html" class="avatar-menu-item" data-i18n="menu_settings">⚙️ Einstellungen</a>
          <button class="avatar-menu-item" onclick="openContactModal()" data-i18n="menu_message">✉️ Nachricht</button>
          <button class="avatar-menu-item avatar-menu-logout" onclick="logout()" data-i18n="menu_logout">🚪 Abmelden</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="home-content">

    <!-- ① MEINE TRAININGS -->
    <div class="page-header">
      <div class="page-title">📋 Meine Trainings</div>
      <a href="#builder-section" class="btn btn-primary" style="width:auto;padding:12px 24px;text-decoration:none">+ Neues Training</a>
    </div>
    <div id="saved-trainings-list">
      <div class="empty-state"><div class="empty-state-icon">🏋️</div><div class="empty-state-text">Noch keine Trainings gespeichert.</div></div>
    </div>

    <!-- ② TRAINING ERSTELLEN -->
    <div id="builder-section" style="margin-top:48px">
      <div class="page-header">
        <div class="page-title" style="font-size:22px">➕ Training erstellen</div>
        <button class="btn btn-outline" style="width:auto;padding:10px 20px" onclick="resetTrainingBuilder()">Leeren</button>
      </div>

      <div class="training-layout">
        <div class="training-sidebar">
          <div class="sidebar-title">Übungen</div>
          <div id="sidebar-exercises">
            <div class="empty-state" style="padding:24px 0">
              <div class="empty-state-icon" style="font-size:28px">💪</div>
              <div class="empty-state-text" style="font-size:13px">Keine Übungen. <a href="exercises.html" style="color:var(--blue)">Erstellen →</a></div>
            </div>
          </div>
        </div>

        <div class="training-builder">
          <div class="builder-card">
            <div class="builder-card-title">Training Info</div>
            <div id="training-alert" class="alert alert-error"></div>
            <input type="hidden" id="edit-training-id" />
            <div class="form-group">
              <label class="form-label" for="tr-title">Titel</label>
              <input class="form-input" type="text" id="tr-title" placeholder="z.B. Beintraining" />
            </div>
            <div class="form-group">
              <label class="form-label" for="tr-desc">Beschreibung</label>
              <textarea class="form-textarea" id="tr-desc" placeholder="Kurze Beschreibung…" style="min-height:70px"></textarea>
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label" for="tr-date">Datum</label>
              <input class="form-input" type="text" id="tr-date" readonly />
            </div>
          </div>

          <div class="builder-card">
            <div class="builder-card-title">Übungen hinzufügen</div>
            <div class="dropzone-area" id="training-dropzone"
                 ondragover="event.preventDefault(); this.classList.add('drag-over')"
                 ondragleave="this.classList.remove('drag-over')"
                 ondrop="onDropExercise(event)">
              <div class="dropzone-empty" id="dropzone-empty">
                <div>⬇️</div>
                <div>Übungen ziehen oder antippen</div>
              </div>
              <div class="dropzone-exercises" id="dropzone-exercises" style="display:none"></div>
            </div>
          </div>

          <button class="btn btn-primary" id="training-save-btn" onclick="saveTraining()">Training speichern ✓</button>
        </div>
      </div>
    </div>
  </main>

  <!-- VIEW TRAINING MODAL -->
  <div class="modal-overlay" id="view-training-modal">
    <div class="modal-card" style="max-width:580px">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="vt-title"></div>
          <div style="color:var(--gray);font-size:13px;margin-top:4px" id="vt-meta"></div>
        </div>
        <button class="modal-close" onclick="document.getElementById('view-training-modal').classList.remove('open')">×</button>
      </div>
      <div id="vt-desc" style="font-size:14px;color:var(--gray);margin-bottom:20px;display:none"></div>
      <div id="vt-exercises"></div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="home.html" class="bottom-nav-item"><span class="bn-icon">🏠</span><span data-i18n="bn_home">Home</span></a>
    <a href="exercises.html" class="bottom-nav-item"><span class="bn-icon">💪</span><span data-i18n="bn_exercises">Übungen</span></a>
    <a href="training.html" class="bottom-nav-item active"><span class="bn-icon">🏋️</span><span data-i18n="bn_training">Training</span></a>
    <a href="plan.html" class="bottom-nav-item"><span class="bn-icon">📅</span><span data-i18n="bn_plan">Plan</span></a>
    <a href="profile.html" class="bottom-nav-item"><span class="bn-icon">👤</span><span data-i18n="bn_profile">Profil</span></a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
